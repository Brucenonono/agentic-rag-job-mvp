chunking:
  source_units:
    - resume_bullets
    - project_bullets
    - project_summaries
  max_tokens_per_chunk: 256
  overlap_tokens: 32

lexical:
  enabled: true
  top_k: 20

dense:
  enabled: true
  model_name: BAAI/bge-small-zh-v1.5
  index_dir: ./data/indexes/faiss
  top_k: 20

hybrid:
  merge_strategy: rrf
  rrf_k: 60

rerank:
  enabled: true
  model_name: BAAI/bge-reranker-base
  top_k: 10
